<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AnyFlow Demo - Redirecting...</title>

    <!-- 1. Meta refresh (works even without JavaScript) -->

    <!-- 2. Canonical hint for crawlers -->
    <link rel="canonical" href="https://kxn6bflf-anyflow-demo.xenon.lepton.run/">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #fafafa;
            color: #333;
            text-align: center;
        }
        .spinner {
            width: 36px;

            border: 3px solid #ddd;
            border-top-color: #555;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="spinner"></div>

    </p>

    <!-- 3. JavaScript redirect (fastest path on modern browsers) -->
    <script>
        window.location.replace("https://kxn6bflf-anyflow-v1-demo.xenon.lepton.run/");
    </script>
</body>
</html>
